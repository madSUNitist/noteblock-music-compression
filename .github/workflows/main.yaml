name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.os }} (Python ${{ matrix.python-version }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        target: [
          x86_64-unknown-linux-gnu,
          x86_64-pc-windows-msvc,
          x86_64-apple-darwin,
          aarch64-apple-darwin
        ]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        exclude:
          # Linux: only `x86_64-unknown-linux-gnu`
          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: aarch64-apple-darwin
          # Windows: only `x86_64-pc-windows-msvc`
          - os: windows-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: aarch64-apple-darwin
          # macOS: only `x86_64-apple-darwin` & `aarch64-apple-darwin`
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.86.0
          target: ${{ matrix.target }}
          override: true

      - name: setup .venv
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install maturin as a uv tool
        run: uv tool install maturin

      - name: Sync Python dependencies (uv sync)
        run: uv sync --python ${{ matrix.python-version }}

      - name: Build wheel
        run: uv run maturin build --release --python ${{ matrix.python-version }} --target ${{ matrix.target }} --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/*.whl

  create_release:
    name: Create GitHub Release and attach wheels
    runs-on: ubuntu-latest
    needs: build_wheels
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all_wheels

      - name: Organize wheels into dist/
        run: |
          mkdir -p dist
          find all_wheels -name "*.whl" -exec cp {} dist/ \;

      - name: Extract release notes from CHANGELOG
        id: extract_notes
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          VERSION=${TAG_NAME#v}
          CHANGELOG_FILE="CHANGELOG.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "CHANGELOG.md not found!"
            exit 1
          fi

          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## /p" "$CHANGELOG_FILE" | sed '$d')
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG_NAME"
          fi
          echo "NOTES=$NOTES"
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.extract_notes.outputs.body }}
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv publish