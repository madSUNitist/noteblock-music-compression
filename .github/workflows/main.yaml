name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.86.0
          target: ${{ matrix.target }}
          override: true

      - name: Sync Python dependencies (uv sync)
        run: uv sync

      - name: Install maturin as a uv tool
        run: uv tool install maturin

      - name: Build wheel
        run: uv run maturin build --release --target ${{ matrix.target }} --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  create_release:
    name: Create GitHub Release and attach wheels
    runs-on: ubuntu-latest
    needs: build_wheels
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all_wheels

      # 将下载的 wheel 统一收集到一个 dist 目录，方便上传到 PyPI 和 GitHub Release
      - name: Organize wheels into dist/
        run: |
          mkdir -p dist
          find all_wheels -name "*.whl" -exec cp {} dist/ \;

      - name: Extract release notes from CHANGELOG
        id: extract_notes
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          VERSION=${TAG_NAME#v}
          CHANGELOG_FILE="CHANGELOG.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "CHANGELOG.md not found!"
            exit 1
          fi
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { found=0; }
            /^## \[/ && found==0 && $2 ~ "\\[" ver "\\]" { found=1; next; }
            /^## [^[]/ && found==0 && $2 == ver { found=1; next; }
            found==1 && /^## / { exit; }
            found==1 { print; }
          ' "$CHANGELOG_FILE")
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG_NAME"
          fi
          delimiter="EOF_$(date +%s)"
          echo "body<<${delimiter}" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "${delimiter}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract_notes.outputs.body }}
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          MATURIN_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv tool run maturin upload --skip-existing dist/*.whl