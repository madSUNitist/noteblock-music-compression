name: Build and Release

on:
  push:
    tags:
      - 'v*'                # 推送 v1.0.0, v0.2.3 等标签时触发
  workflow_dispatch:        # 也允许手动触发（调试用）

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin   # Apple Silicon (M1/M2/M3)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.86.0
          target: ${{ matrix.target }}
          override: true

      - name: Sync Python dependencies (uv sync)
        run: uv sync

      - name: Install maturin as a uv tool
        run: uv tool install maturin

      - name: Build wheel
        run: uv run maturin build --release --target ${{ matrix.target }} --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  create_release:
    name: Create GitHub Release and attach wheels
    runs-on: ubuntu-latest
    needs: build_wheels
    permissions:
      contents: write          # 必须：允许修改 Release
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all_wheels

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # 自动生成发布说明
          files: all_wheels/**/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}